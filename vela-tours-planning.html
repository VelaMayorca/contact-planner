<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vela Tours · Planning</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--deep:#08213a;--mid:#1a4a6b;--blue:#2d7db3;--teal:#4abfb0;--sand:#faf7f2;--white:#ffffff;--text:#0a2540;--muted:#5a7a94;--border:#d8e8f2;--success:#22a06b;--warn:#e68a00;--danger:#d93025;}
  body{font-family:'Inter',sans-serif;background:var(--sand);color:var(--text);min-height:100vh;}
  header{background:var(--deep);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
  .logo{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--white);display:flex;align-items:center;gap:8px;}
  .logo span{color:var(--teal);}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sync-info{font-size:0.7rem;color:var(--muted);white-space:nowrap;}
  .today-badge{font-size:0.75rem;font-weight:600;color:var(--teal);border:1.5px solid var(--teal);border-radius:20px;padding:3px 10px;}
  .btn{border:none;border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:opacity 0.2s;display:inline-flex;align-items:center;gap:5px;}
  .btn:hover{opacity:0.85;}.btn:disabled{opacity:0.5;pointer-events:none;}
  .btn-blue{background:var(--blue);color:#fff;}.btn-deep{background:var(--deep);color:#fff;}.btn-danger{background:var(--danger);color:#fff;}.btn-teal{background:var(--teal);color:#fff;}
  /* Tabs */
  .tabs{background:var(--white);border-bottom:2px solid var(--border);display:flex;padding:0 18px;overflow-x:auto;}
  .tab{padding:12px 16px;font-size:0.82rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue);}.tab:hover:not(.active){color:var(--text);}
  main{padding:20px 18px;max-width:960px;margin:0 auto;}
  /* Filters */
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
  .filter-label{font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
  .filter-chip{border:1.5px solid var(--border);background:var(--white);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;}
  .filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .filter-chip:hover:not(.active){border-color:var(--blue);color:var(--blue);}
  /* Skipper filter */
  .skipper-select{border:1.5px solid var(--border);background:var(--white);color:var(--text);border-radius:20px;padding:5px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;outline:none;}
  /* Login */
  #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;gap:20px;}
  .login-icon{font-size:3rem;}.login-title{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text);}
  .login-sub{color:var(--muted);font-size:0.9rem;max-width:360px;line-height:1.6;}
  .btn-google{background:#fff;color:#3c4043;border:2px solid var(--border);border-radius:10px;padding:12px 24px;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:box-shadow 0.2s;}
  .btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,0.15);}
  /* States */
  .state-screen{text-align:center;padding:60px 20px;color:var(--muted);}
  .state-screen .icon{font-size:2.5rem;margin-bottom:14px;}
  .state-screen h2{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);margin-bottom:8px;}
  .state-screen p{font-size:0.88rem;line-height:1.6;}
  @keyframes spin{to{transform:rotate(360deg);}}.spinning{display:inline-block;animation:spin 1s linear infinite;}
  /* Summary */
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .summary-bar{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;gap:20px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(10,33,64,0.07);}
  .sum-item{text-align:center;}.sum-num{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--blue);line-height:1;}
  .sum-label{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}
  .sum-balance{color:var(--success);}
  /* Admin bar */
  .admin-bar{background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-radius:12px;margin-bottom:16px;font-size:0.8rem;}
  .admin-bar strong{color:var(--teal);}
  /* New notes badge */
  .new-badge{background:var(--danger);color:#fff;font-size:0.65rem;font-weight:700;border-radius:10px;padding:2px 6px;margin-left:4px;vertical-align:middle;}
  /* Day section */
  .day-section{margin-bottom:28px;}
  .day-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .day-label{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);}
  .day-label .weekday{color:var(--muted);font-size:0.88rem;font-family:'Inter',sans-serif;font-weight:500;margin-left:6px;}
  .day-count{font-size:0.72rem;font-weight:700;background:var(--teal);color:#fff;border-radius:12px;padding:2px 8px;}
  /* Cards */
  .booking-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 12px rgba(10,33,64,0.07);transition:border-color 0.2s;}
  .booking-card:hover{border-color:var(--blue);}
  .booking-card.has-new-notes{border-color:var(--danger);}
  .card-top{padding:14px 18px;display:flex;align-items:flex-start;gap:12px;}
  .time-col{flex-shrink:0;text-align:center;min-width:48px;cursor:pointer;}
  .time-big{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--blue);line-height:1;}
  .time-end{font-size:0.68rem;color:var(--muted);margin-top:2px;}
  .divider-v{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}
  .info-col{flex:1;min-width:0;cursor:pointer;}
  .booking-title{font-weight:700;font-size:0.95rem;color:var(--text);margin-bottom:3px;}
  .booking-buyer{font-size:0.85rem;color:var(--mid);font-weight:600;margin-bottom:2px;}
  .booking-email{font-size:0.75rem;color:var(--muted);margin-bottom:5px;}
  .booking-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;align-items:center;}
  .meta-chip{font-size:0.72rem;font-weight:600;padding:2px 7px;border-radius:6px;display:flex;align-items:center;gap:3px;}
  .chip-pax{background:#e8f4fd;color:var(--blue);}.chip-type{background:#f0faf9;color:#1a8a7a;}
  .chip-boat{background:#fff3e0;color:#e65100;font-weight:700;}
  .phone-row{display:flex;align-items:center;gap:8px;padding:0 18px 10px;flex-wrap:wrap;}
  .phone-input{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--mid);letter-spacing:0.03em;border:none;outline:none;background:transparent;width:190px;cursor:text;}
  .phone-input:focus{border-bottom:2px solid var(--blue);background:#f0f8ff;border-radius:4px 4px 0 0;padding:2px 4px;}
  .btn-phone-save{display:none;background:var(--success);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:0.72rem;font-weight:600;cursor:pointer;}
  .prefix-hint{font-size:0.72rem;color:var(--warn);display:block;margin-top:2px;}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;display:none;}
  .dot-pending{background:var(--warn);}.dot-done{background:var(--success);}.dot-none{background:var(--border);}.dot-ready{background:#7c3aed;}
  /* Ready card */
  .booking-card.is-contacted{background:#f0fdf4!important;}
  .booking-card.is-ready{border-color:#16a34a!important;background:#86efac!important;}
  .booking-card.is-ready .time-big{color:#16a34a;}
  .ready-badge{background:#7c3aed;color:#fff;font-size:0.68rem;font-weight:700;border-radius:10px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
  /* Progress ring */
  .progress-wrap{display:flex;align-items:center;gap:16px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:18px;box-shadow:0 2px 8px rgba(10,33,64,0.07);}
  .progress-ring{position:relative;width:70px;height:70px;flex-shrink:0;}
  .progress-ring svg{transform:rotate(-90deg);}
  .progress-ring .ring-bg{fill:none;stroke:#e8f0fe;stroke-width:6;}
  .progress-ring .ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease;}
  .progress-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1rem;font-weight:700;}
  .progress-info{flex:1;}
  .progress-title{font-weight:700;font-size:0.95rem;color:var(--text);margin-bottom:4px;}
  .progress-sub{font-size:0.78rem;color:var(--muted);}
  .btn-notify{background:#25d366;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .card-actions{padding:0 18px 12px;display:flex;gap:7px;flex-wrap:wrap;}
  .notes-summary{padding:0 18px 10px;display:flex;flex-wrap:wrap;gap:6px;}
  .note-pill{font-size:0.72rem;background:rgba(0,0,0,0.05);color:var(--muted);border-radius:20px;padding:3px 9px;display:flex;align-items:center;gap:4px;}
  .note-pill strong{color:var(--text);font-weight:600;}
  .btn-sm{border:none;border-radius:7px;padding:6px 11px;font-size:0.75rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.15s,transform 0.1s;display:inline-flex;align-items:center;gap:4px;}
  .btn-sm:active{transform:scale(0.95);}
  .btn-copy{background:var(--border);color:var(--text);}.btn-copy.done{background:var(--success);color:#fff;}
  .btn-wa{background:#25d366;color:#fff;font-weight:700;}.btn-notes{background:var(--sand);border:1.5px solid var(--border);color:var(--muted);}
  .btn-export{background:var(--deep);color:#fff;}
  /* Notes */
  .notes-panel{border-top:1.5px solid var(--border);padding:14px 18px;background:#fafcff;display:none;}
  .notes-panel.open{display:block;}
  .notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  @media(max-width:600px){.notes-grid{grid-template-columns:1fr;}main{padding:12px;}}
  .note-field label{display:block;font-size:0.7rem;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
  .note-field input,.note-field select,.note-field textarea{width:100%;font-family:'Inter',sans-serif;font-size:0.86rem;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;color:var(--text);background:#fff;outline:none;transition:border-color 0.2s;}
  .note-field input:focus,.note-field select:focus,.note-field textarea:focus{border-color:var(--blue);}
  .note-field textarea{resize:vertical;min-height:56px;}
  .notes-footer{display:flex;gap:8px;justify-content:flex-end;align-items:center;}
  .save-status{font-size:0.72rem;color:var(--muted);}
  .btn-save{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;}
  .btn-save.saved{background:var(--success);}
  /* Export modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--white);border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
  .modal h2{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:14px;color:var(--text);}
  .export-text{background:#1a1a2e;color:#e0e0e0;font-family:monospace;font-size:0.85rem;padding:14px;border-radius:10px;white-space:pre-wrap;line-height:1.7;margin-bottom:14px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  /* Date nav for history */
  .date-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .date-nav button{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'Inter',sans-serif;font-size:0.82rem;cursor:pointer;color:var(--text);}
  .date-nav button:hover{border-color:var(--blue);color:var(--blue);}
  .date-nav .current-date{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);min-width:160px;text-align:center;}
</style>
</head>
<body>
<header>
  <div class="logo">&#9975; <span>Vela Tours</span></div>
  <div class="header-right">
    <div class="sync-info" id="syncInfo"></div>
    <div class="today-badge" id="todayBadge"></div>
    <button class="btn btn-teal" id="btnSync" onclick="syncCalendar()" style="display:none">&#8645; Sync</button>
    <button class="btn btn-blue" id="btnRefresh" onclick="loadFromSupabase()" style="display:none">&#8635;</button>
    <button class="btn btn-danger" id="btnLogout" onclick="logout()" style="display:none">Salir</button>
  </div>
</header>
<div class="tabs" id="tabBar" style="display:none">
  <div class="tab active" onclick="switchTab('tomorrow')" id="tab-tomorrow">&#128197; Manana</div>
  <div class="tab" onclick="switchTab('week')" id="tab-week">&#128197; Semana</div>
  <div class="tab" onclick="switchTab('history')" id="tab-history">&#128337; Historico</div>
</div>
<main>
  <div id="loginScreen" style="display:none">
    <div class="login-icon">&#9975;</div>
    <div class="login-title">Vela Tours &middot; Admin</div>
    <div class="login-sub">Conecta tu Google Calendar para sincronizar las reservas con el equipo.</div>
    <button class="btn-google" onclick="startAuth()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Conectar con Google
    </button>
  </div>
  <div id="appContent" style="display:none">
    <div id="view-tomorrow"></div>
    <div id="view-week" style="display:none"></div>
    <div id="view-history" style="display:none"></div>
  </div>
</main>

<div class="modal-overlay" id="exportModal" style="display:none" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <h2>&#128203; Resumen del dia</h2>
    <div class="export-text" id="exportText"></div>
    <div class="modal-actions">
      <button class="btn btn-blue" onclick="copyExport()">&#128203; Copiar</button>
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const _a='472909472248-mkbdkopci5p8guo7eo3agl5a9v1mid';
const _b='ua.apps.googleusercontent.com';
const _c='GOCSPX-qsvIFRsFnn0nPD';
const _d='xOAywnCGYORS6O';
const _e='https://pqyiuhgybsnvhuz';
const _f='sjnpy.supabase.co';
const _g='sb_publishable_V3ZCmMWZwGCve5Os3AO6bA';
const _h='_A_-hQJMb';
const CLIENT_ID=_a+_b, CLIENT_SECRET=_c+_d, SUPABASE_URL=_e+_f, SUPABASE_KEY=_g+_h;
const CALENDAR_NAMES=['SARAH','BTP'], ADMIN_KEY='vela-admin-2024';
const BOATS=['Servus','Gambitero','Trui','Jaleo','RunWild'];
const SKIPPERS=['Edu','Alberto','Silvio','Jaume','Gustavo','Leandro','Otro...'];

const urlParams=new URLSearchParams(window.location.search);
const isAdmin=urlParams.get('admin')===ADMIN_KEY||localStorage.getItem('vt_admin')===ADMIN_KEY;
if(urlParams.get('admin')===ADMIN_KEY){localStorage.setItem('vt_admin',ADMIN_KEY);window.history.replaceState({},'',window.location.pathname);}

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ── Supabase ──────────────────────────────────────────────────────────────────
async function loadAllNotes(){const{data,error}=await sb.from('notas').select('*');if(error){console.error(error);return{};}const map={};for(const r of(data||[]))map[r.event_id]=r;return map;}
async function upsertNote(eventId,fields){const{error}=await sb.from('notas').upsert({event_id:eventId,...fields,updated_at:new Date().toISOString()},{onConflict:'event_id'});if(error)throw error;}
async function saveEventsToSupabase(events){
  if(!events.length)return;
  const rows=events.map(b=>({id:b.id,title:b.title,start_time:b.start||null,end_time:b.end||null,date:b.date,buyer:b.parsed.buyer,phone:b.parsed.phone,email:b.parsed.email,pax:b.parsed.pax,variant:b.parsed.variant,updated_at:new Date().toISOString()}));
  const{error}=await sb.from('eventos').upsert(rows,{onConflict:'id'});
  if(error)throw error;
  localStorage.setItem('vt_last_sync',new Date().toISOString());
  updateSyncInfo();
}
async function loadEventsFromSupabase(dateFrom,dateTo){
  const{data,error}=await sb.from('eventos').select('*').gte('date',dateFrom).lte('date',dateTo).order('start_time');
  if(error)throw error;
  return(data||[]).map(r=>({id:r.id,title:r.title,start:r.start_time,end:r.end_time,date:r.date,parsed:{buyer:r.buyer||'',phone:r.phone||'',email:r.email||'',pax:r.pax||'',variant:r.variant||''}}));
}

function updateSyncInfo(){
  const last=localStorage.getItem('vt_last_sync');
  const el=document.getElementById('syncInfo');
  if(!el)return;
  if(last){const d=new Date(last);el.textContent='Sync: '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let accessToken=null,tokenExpiry=0;
function getRedirectUri(){return window.location.href.split('?')[0].split('#')[0];}
function saveToken(t,exp){accessToken=t;tokenExpiry=Date.now()+(exp-60)*1000;try{sessionStorage.setItem('vt_token',t);sessionStorage.setItem('vt_expiry',tokenExpiry);}catch(e){}}
function loadToken(){try{const t=sessionStorage.getItem('vt_token'),e=parseInt(sessionStorage.getItem('vt_expiry')||'0');if(t&&Date.now()<e){accessToken=t;tokenExpiry=e;return true;}}catch(e){}return false;}
function clearToken(){accessToken=null;tokenExpiry=0;try{sessionStorage.removeItem('vt_token');sessionStorage.removeItem('vt_expiry');}catch(e){}}
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}
async function startAuth(){
  const ver=await genVerifier(),chal=await genChallenge(ver);
  sessionStorage.setItem('vt_verifier',ver);
  const p=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:getRedirectUri(),response_type:'code',scope:'https://www.googleapis.com/auth/calendar.readonly',code_challenge:chal,code_challenge_method:'S256',access_type:'online',prompt:'consent'});
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+p;
}
async function handleCallback(code){
  const ver=sessionStorage.getItem('vt_verifier')||'';sessionStorage.removeItem('vt_verifier');
  showLoading('Autenticando...');
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({code,client_id:CLIENT_ID,client_secret:CLIENT_SECRET,redirect_uri:getRedirectUri(),grant_type:'authorization_code',code_verifier:ver})});
  const d=await r.json();
  if(d.access_token){saveToken(d.access_token,d.expires_in||3600);window.history.replaceState({},'',window.location.pathname);showApp(true);await syncCalendar();}
  else showError('Error auth: '+(d.error_description||d.error||'desconocido'));
}

// ── Google Calendar ───────────────────────────────────────────────────────────
async function getCalendarIds(){
  const r=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  const cals=(d.items||[]).filter(c=>CALENDAR_NAMES.some(n=>c.summary?.toUpperCase().includes(n)||c.summaryOverride?.toUpperCase().includes(n)));
  return cals.length?cals.map(c=>c.id):['primary'];
}
async function fetchGoogleEvents(calId,tMin,tMax){
  const p=new URLSearchParams({timeMin:tMin.toISOString(),timeMax:tMax.toISOString(),singleEvents:'true',orderBy:'startTime',maxResults:'100'});
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events?'+p,{headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();if(d.error)throw new Error(d.error.message);return d.items||[];
}
async function syncCalendar(){
  const btn=document.getElementById('btnSync');if(btn){btn.disabled=true;btn.innerHTML='&#8645;...';}
  showLoading('Sincronizando calendarios...');
  try{
    const calIds=await getCalendarIds();
    const tom=new Date();tom.setDate(tom.getDate()+1);
    const tStart=new Date(tom);tStart.setHours(0,0,0,0);
    const wEnd=new Date(tStart);wEnd.setDate(tStart.getDate()+13);wEnd.setHours(23,59,59,999); // 2 weeks
    const allEventsArr=await Promise.all(calIds.map(id=>fetchGoogleEvents(id,tStart,wEnd)));
    const events=allEventsArr.flat();
    const bookings=events.map(parseEvent);
    await saveEventsToSupabase(bookings);
    await loadFromSupabase();
  }catch(err){showError('Error sync: '+err.message);}
  if(btn){btn.disabled=false;btn.innerHTML='&#8645; Sync';}
}

// ── Load from Supabase ────────────────────────────────────────────────────────
async function loadFromSupabase(){
  const btn=document.getElementById('btnRefresh');if(btn){btn.disabled=true;}
  showLoading('Cargando reservas...');
  try{
    const tom=new Date();tom.setDate(tom.getDate()+1);

  }catch(err){showError('Error: '+err.message);}
  if(btn){btn.disabled=false;}
  updateSyncInfo();
}

function toDateStr(d){return d.toISOString().split('T')[0];}
function formatTime(iso){if(!iso||!iso.includes('T'))return'--';try{return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}catch(e){return'--';}}
function formatDateLabel(ds){try{const d=new Date(ds+'T12:00:00');return{weekday:d.toLocaleDateString('es-ES',{weekday:'long'}),rest:d.toLocaleDateString('es-ES',{day:'numeric',month:'long'})};}catch(e){return{weekday:'',rest:ds};}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function hasNewNotes(eventId){
  const n=allNotes[eventId];
  if(!n||!n.updated_at)return false;
  const seen=lastSeenNotes[eventId];
  if(!seen)return true;
  return new Date(n.updated_at)>new Date(seen);
}
function markAsSeen(eventId){
  const n=allNotes[eventId];
  if(n&&n.updated_at){lastSeenNotes[eventId]=n.updated_at;try{localStorage.setItem('vt_seen_notes',JSON.stringify(lastSeenNotes));}catch(e){}}
}

// ── Parse ─────────────────────────────────────────────────────────────────────
function parseEvent(ev){
  const raw=ev.description||'';
  const desc=raw.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
  const get=re=>{const m=desc.match(re);return m?(m[1]||'').trim():'';};
  const buyer=get(/Buyer:\s*(.+?)(?=Customer Phone:|Customer Email:|$)/i);
  const phone=(get(/Customer Phone:\s*(\S+)/i)||get(/Phone:\s*(\S+)/i)).replace(/[<>]/g,'');
  const email=(get(/Customer Email:\s*(\S+)/i)||get(/Email:\s*(\S+)/i)).replace(/[<>[\]]/g,'');
  const pax=get(/N[uú]mero de participantes:\s*(\d+)/i)||get(/participants?:\s*(\d+)/i)||get(/(\d+)\s*pax/i);
  const variant=get(/Variation Name:\s*(.+?)(?=Buyer:|Customer|$)/i);
  const start=ev.start?.dateTime||ev.start?.date||'';
  return{id:ev.id,title:ev.summary||'Sin titulo',start,end:ev.end?.dateTime||ev.end?.date||'',date:start.split('T')[0],parsed:{buyer,phone,email,pax,variant}};
}

// ── Prefix ────────────────────────────────────────────────────────────────────
const CDB=[{cc:'+34',flag:'\uD83C\uDDEA\uD83C\uDDF8',local:[9]},{cc:'+44',flag:'\uD83C\uDDEC\uD83C\uDDE7',local:[10]},{cc:'+49',flag:'\uD83C\uDDE9\uD83C\uDDEA',local:[10,11]},
  {cc:'+33',flag:'\uD83C\uDDEB\uD83C\uDDF7',local:[9]},{cc:'+1',flag:'\uD83C\uDDFA\uD83C\uDDF8',local:[10]},{cc:'+31',flag:'\uD83C\uDDF3\uD83C\uDDF1',local:[9]},
  {cc:'+39',flag:'\uD83C\uDDEE\uD83C\uDDF9',local:[9,10]},{cc:'+351',flag:'\uD83C\uDDF5\uD83C\uDDF9',local:[9]},{cc:'+55',flag:'\uD83C\uDDE7\uD83C\uDDF7',local:[11]},{cc:'+61',flag:'\uD83C\uDDE6\uD83C\uDDFA',local:[9]}];
const BOOST={'+34':2.5,'+44':2.0,'+49':1.8,'+33':1.5,'+1':1.5,'+31':1.4};
function hasPrefix(p){const n=p.replace(/[\s\-(). ]/g,'');return n.startsWith('+')||n.startsWith('00');}
function guessPrefix(phone){
  const n=phone.replace(/[\s\-(). ]/g,'');if(hasPrefix(phone))return null;
  let best=null,bestS=0;
  for(const e of CDB){let s=5;
    if(e.local.includes(n.length))s+=30;
    if(e.cc==='+34'&&n.length===9&&['6','7'].includes(n[0]))s+=50;
    if(e.cc==='+44'&&n.startsWith('07')&&n.length===11)s+=50;
    if(e.cc==='+31'&&n.startsWith('06')&&n.length===10)s+=45;
    if(e.cc==='+49'&&n.startsWith('0')&&n.length>=10)s+=25;
    if(e.cc==='+33'&&n.startsWith('0')&&n.length===10)s+=30;
    if(e.cc==='+1'&&n.length===10)s+=20;
    s*=(BOOST[e.cc]||1);if(s>bestS){bestS=s;best=e;}}
  return best;
}
function getFlag(phone){
  if(!phone)return '';
  const n=phone.replace(/[\s\-(). ]/g,'');
  if(n.startsWith('+')){for(const len of[3,2,1]){const cc='+'+n.slice(1,1+len);const e=CDB.find(x=>x.cc===cc);if(e)return e.flag;}}
  const g=guessPrefix(phone);return g?g.flag:'';
}
function buildWa(phone){
  let n=phone.replace(/[\s\-(). ]/g,'');
  if(n.startsWith('00'))n='+'+n.slice(2);
  if(!n.startsWith('+')){const g=guessPrefix(phone);if(g){let l=n;if(['+44','+31','+49','+33'].includes(g.cc)&&n.startsWith('0'))l=n.slice(1);n=g.cc.replace('+','')+l;}}
  else n=n.slice(1);return n;
}

// ── Progress & ready logic ───────────────────────────────────────────────────
function isBookingReady(n,phone){
  const p=phone||n.phone||'';
  const foodOk=n.food==='no'||((n.food_tapas||0)+(n.food_fish||0)+(n.food_meat||0))>0;
  return !!(p && n.pax && foodOk && n.boat && n.balance && n.contacted==='reminder' && n.comment);
}
function calcProgress(bookings){
  if(!bookings.length)return{pct:0,ready:0,total:0,pending:[]};
  const FIELDS=['phone','pax','food','boat','balance','contacted','comment'];
  let totalFields=0,filledFields=0,readyCount=0,pendingNames=[];
  for(const b of bookings){
    const n=allNotes[b.id]||{};
    const phone=n.phone||b.parsed.phone||'';
    totalFields+=FIELDS.length;
    if(phone)filledFields++;
    if(n.pax)filledFields++;
    const foodFilled=n.food==='no'||((n.food_tapas||0)+(n.food_fish||0)+(n.food_meat||0))>0;
    if(foodFilled)filledFields++;
    if(n.boat)filledFields++;
    if(n.balance)filledFields++;
    if(n.contacted==='reminder')filledFields++;
    if(n.comment)filledFields++;
    if(isBookingReady(n,phone))readyCount++;
    else pendingNames.push(b.parsed.buyer||b.title);
  }
  return{pct:Math.round(filledFields/totalFields*100),ready:readyCount,total:bookings.length,pending:pendingNames};
}
function renderProgressRing(bookings,isTomorrow){
  if(!isTomorrow)return'';
  const{pct,ready,total,pending}=calcProgress(bookings);
  const r=30,circ=2*Math.PI*r,offset=circ-(pct/100*circ);
  const color=pct===100?'#7c3aed':pct>=60?'var(--success)':pct>=30?'var(--warn)':'var(--danger)';
  let notifyBtn='';
  if(pct===100){
    const msg=encodeURIComponent('Hola Alberto! Ya puedes acceder a exportar el planning de manana. Todo completado al 100%.');
    notifyBtn='<a href="https://wa.me/34672751717?text='+msg+'" target="_blank"><button class="btn-notify">&#128172; Avisar a Alberto</button></a>';
  }
  const subText=pct===100?'Todo completado! '+ready+'/'+total+' reservas listas.':(ready+'/'+total+' reservas completas. Pendiente: '+pending.slice(0,2).map(n=>n.split(' ')[0]).join(', ')+(pending.length>2?' y '+(pending.length-2)+' mas':'')+'.');
  return'<div class="progress-wrap"><div class="progress-ring"><svg width="70" height="70" viewBox="0 0 70 70"><circle class="ring-bg" cx="35" cy="35" r="'+r+'"/><circle class="ring-fill" cx="35" cy="35" r="'+r+'" stroke="'+color+'" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'"/></svg><div class="progress-pct" style="color:'+color+'">'+pct+'%</div></div><div class="progress-info"><div class="progress-title">Planning de manana</div><div class="progress-sub">'+subText+'</div></div>'+notifyBtn+'</div>';
}

  html+='</div>';

  // Notes panel
  const boatOpts=BOATS.map(bt=>'<option value="'+bt+'" '+(n.boat===bt?'selected':'')+'>'+bt+'</option>').join('');
  const skipOpts=SKIPPERS.map(sk=>'<option value="'+sk+'" '+(n.skipper===sk?'selected':'')+'>'+sk+'</option>').join('');
  html+='<div class="notes-panel '+(allNotes[b.id]?'open':'')+'" id="notes-'+sid+'">';
  html+='<div class="notes-grid">';
  html+='<div class="note-field"><label>Personas confirmadas</label><input type="number" min="1" max="50" placeholder="'+esc(p.pax||'')+'" value="'+esc(n.pax||'')+'" id="n-pax-'+sid+'"/></div>';
  html+='<div class="note-field"><label>Comida</label><select id="n-food-'+sid+'" onchange="toggleFoodFields(this)">'
  +'<option value="" '+((!n.food)?'selected':'')+'>-- Sin confirmar --</option>'
  +'<option value="si" '+((n.food==='si')?'selected':'')+'>Si quieren</option>'
  +'<option value="no" '+((n.food==='no')?'selected':'')+'>No quieren</option>'
  +'<option value="pendiente" '+((n.food==='pendiente')?'selected':'')+'>Pendiente</option>'
  +'</select></div>';
  const foodVisible=(n.food==='si'||(!n.food&&((n.food_tapas||0)+(n.food_fish||0)+(n.food_meat||0))>0));
  html+='<div class="note-field food-qty-fields" id="food-qty-'+sid+'" style="grid-column:1/-1;display:'+(foodVisible?'block':'none')+'">'
  +'<label>Cantidades de comida</label>'
  +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">'
  +'<div style="flex:1;min-width:100px"><div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px">&#127860; Tapas</div><input type="number" min="0" max="50" placeholder="0" value="'+(n.food_tapas||'')+'" id="n-tapas-'+sid+'"/></div>'
  +'<div style="flex:1;min-width:100px"><div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px">&#128031; Fish Paella</div><input type="number" min="0" max="50" placeholder="0" value="'+(n.food_fish||'')+'" id="n-fish-'+sid+'"/></div>'
  +'<div style="flex:1;min-width:100px"><div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px">&#129385; Meat Paella</div><input type="number" min="0" max="50" placeholder="0" value="'+(n.food_meat||'')+'" id="n-meat-'+sid+'"/></div>'
  +'</div></div>';
  html+='<div class="note-field"><label>Barco</label><select id="n-boat-'+sid+'"><option value="">-- Seleccionar --</option>'+boatOpts+'</select></div>';
  html+='<div class="note-field"><label>Patron</label><select id="n-skipper-'+sid+'"><option value="">-- Seleccionar --</option>'+skipOpts+'</select></div>';
  html+='<div class="note-field"><label>Balance (EUR)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="'+esc(n.balance||'')+'" id="n-balance-'+sid+'"/></div>';
  html+='<div class="note-field"><label>Extras</label><input type="text" placeholder="Snorkel, kayak..." value="'+esc(n.extras||'')+'" id="n-extras-'+sid+'"/></div>';
  html+='<div class="note-field"><label>Contactado</label><select id="n-contacted-'+sid+'"><option value="" '+((!n.contacted)?'selected':'')+'>-- Pendiente --</option><option value="si" '+((n.contacted==='si')?'selected':'')+'>Si, contactado</option><option value="reminder" '+((n.contacted==='reminder')?'selected':'')+'>Reminder enviado</option><option value="no_responde" '+((n.contacted==='no_responde')?'selected':'')+'>No responde</option></select></div>';
  html+='<div class="note-field" style="grid-column:1/-1"><label>Peticiones / Comida</label><textarea placeholder="Tapas, Paella, alergias..." id="n-comment-'+sid+'">'+esc(n.comment||'')+'</textarea></div>';
  html+='</div>';
  html+='<div class="notes-footer"><span class="save-status" id="status-'+sid+'"></span><button class="btn-save" id="save-'+sid+'" onclick="saveNotes(\''+sid+'\',\''+esc(b.id)+'\')">Guardar notas</button></div>';
  html+='</div></div>';
  return html;
}

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleFoodFields(el){
  const card=el.closest('.booking-card');
  if(!card)return;
  const sid=card.id.replace('card-','');
  const qty=document.getElementById('food-qty-'+sid);
  if(!qty)return;
  qty.style.display=el.value==='si'?'block':'none';
}
function toggleNotes(sid,eventId){
  document.getElementById('notes-'+sid)?.classList.toggle('open');
  markAsSeen(eventId);
  const card=document.getElementById('card-'+sid);
  if(card)card.classList.remove('has-new-notes');
}
function onPhoneInput(sid){const btn=document.getElementById('phonesave-'+sid);if(btn)btn.style.display='inline-flex';}
function onPhoneBlur(sid){setTimeout(()=>{const btn=document.getElementById('phonesave-'+sid);if(btn&&document.activeElement!==btn)btn.style.display='none';},200);}
async function savePhone(sid,eventId){
  const inp=document.getElementById('phone-'+sid),btn=document.getElementById('phonesave-'+sid);
  if(!inp)return;
  btn.textContent='...';
  try{
    const existing=allNotes[eventId]||{};
    await upsertNote(eventId,{...existing,phone:inp.value.trim()});
    if(!allNotes[eventId])allNotes[eventId]={};
    allNotes[eventId].phone=inp.value.trim();
    btn.textContent='OK';btn.style.background='var(--success)';
    setTimeout(()=>{btn.style.display='none';btn.textContent='Guardar';btn.style.background='';},1500);
  }catch(err){btn.textContent='Error';setTimeout(()=>{btn.style.display='none';btn.textContent='Guardar';},2000);}
}
async function saveNotes(sid,eventId){
  const btn=document.getElementById('save-'+sid),st=document.getElementById('status-'+sid);
  btn.disabled=true;btn.textContent='Guardando...';if(st)st.textContent='';
  const fields={
    pax:document.getElementById('n-pax-'+sid)?.value||'',
    food:document.getElementById('n-food-'+sid)?.value||'',
    food_tapas:parseInt(document.getElementById('n-tapas-'+sid)?.value)||0,
    food_fish:parseInt(document.getElementById('n-fish-'+sid)?.value)||0,
    food_meat:parseInt(document.getElementById('n-meat-'+sid)?.value)||0,
    boat:document.getElementById('n-boat-'+sid)?.value||'',
    skipper:document.getElementById('n-skipper-'+sid)?.value||'',
    balance:parseFloat(document.getElementById('n-balance-'+sid)?.value)||null,
    extras:document.getElementById('n-extras-'+sid)?.value||'',
    contacted:document.getElementById('n-contacted-'+sid)?.value||'',
    comment:document.getElementById('n-comment-'+sid)?.value||'',
    phone:allNotes[eventId]?.phone||''
  };
  try{
    await upsertNote(eventId,fields);allNotes[eventId]={...fields,event_id:eventId};
    markAsSeen(eventId);
    btn.textContent='Guardado';btn.classList.add('saved');if(st)st.textContent='Sincronizado';
    setTimeout(()=>{btn.textContent='Guardar notas';btn.classList.remove('saved');btn.disabled=false;if(st)st.textContent='';},2500);
    const dot=document.getElementById('dot-'+sid);if(dot)dot.className='status-dot '+(fields.contacted==='si'?'dot-done':'dot-pending');
    const meta=document.querySelector('#card-'+sid+' .booking-meta');
    if(meta){
      const ev=allBookings.find(b=>b.id===eventId);
      const pax=ev?.parsed?.pax||'',variant=ev?.parsed?.variant||'';
      let chips='';
      if(pax)chips+='<span class="meta-chip chip-pax">&#128101; '+esc(pax)+' pax</span>';
      if(fields.boat)chips+='<span class="meta-chip chip-boat">&#128674; '+esc(fields.boat)+'</span>';
      if(fields.skipper)chips+='<span class="meta-chip chip-type">&#128081; '+esc(fields.skipper)+'</span>';
      if(variant)chips+='<span class="meta-chip chip-type">'+esc(variant)+'</span>';
      meta.innerHTML=chips;
    }
  }catch(err){btn.textContent='Error';btn.disabled=false;if(st)st.textContent='Error: '+err.message;}
}
function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copiado';btn.classList.add('done');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('done');},2000);});}

// ── History tab ───────────────────────────────────────────────────────────────
let historyDate=new Date();
historyDate.setDate(historyDate.getDate()-1); // yesterday default

async function renderHistory(){
  const el=document.getElementById('view-history');
  const dStr=toDateStr(historyDate);
  const{weekday,rest}=formatDateLabel(dStr);
  el.innerHTML='<div class="date-nav"><button onclick="changeHistoryDate(-1)">&#8592; Anterior</button><div class="current-date">'+rest+' &middot; '+weekday+'</div><button onclick="changeHistoryDate(1)">Siguiente &#8594;</button></div><div class="state-screen"><div class="icon spinning">&#8635;</div><h2>Cargando...</h2></div>';
  try{
    const[events,notesMap]=await Promise.all([loadEventsFromSupabase(dStr,dStr),loadAllNotes()]);
    allNotes={...allNotes,...notesMap};
    const{weekday:wd,rest:r}=formatDateLabel(dStr);
    let html='<div class="date-nav"><button onclick="changeHistoryDate(-1)">&#8592; Anterior</button><div class="current-date">'+r+' &middot; '+wd+'</div><button onclick="changeHistoryDate(1)">Siguiente &#8594;</button></div>';
    if(!events.length){html+='<div class="state-screen"><div class="icon">&#127754;</div><h2>Sin reservas</h2><p>No hubo tours este dia.</p></div>';}
    else{
      const totalPax=events.reduce((s,b)=>s+(parseInt(b.parsed.pax)||0),0);
      const totalBalance=events.reduce((s,b)=>s+(parseFloat(allNotes[b.id]?.balance)||0),0);
      html+='<div class="top-bar"><div class="summary-bar"><div class="sum-item"><div class="sum-num">'+events.length+'</div><div class="sum-label">Tours</div></div><div class="sum-item"><div class="sum-num">'+(totalPax||'--')+'</div><div class="sum-label">Personas</div></div>'+(totalBalance>0?'<div class="sum-item"><div class="sum-num sum-balance">'+totalBalance.toLocaleString('es-ES')+'&#8364;</div><div class="sum-label">Balance</div></div>':'')+'</div></div>';
      for(const b of events)html+=renderCard(b);
    }
    el.innerHTML=html;
  }catch(err){el.innerHTML='<div class="state-screen"><div class="icon">&#9888;</div><h2>Error</h2><p>'+esc(err.message)+'</p></div>';}
}
function changeHistoryDate(dir){historyDate.setDate(historyDate.getDate()+dir);renderHistory();}

// ── Export ────────────────────────────────────────────────────────────────────
function showExport(){
  const tom=new Date();tom.setDate(tom.getDate()+1);
  const tStr=toDateStr(tom);
  const dayBookings=filterBookings(allBookings.filter(b=>b.date===tStr));
  if(!dayBookings.length){alert('No hay reservas para manana.');return;}
  const weekdays=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const d=new Date(tStr+'T12:00:00');
  let text='*'+weekdays[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+'*\n\n';
  for(const b of dayBookings){
    const n=allNotes[b.id]||{},p=b.parsed;
    const phone=n.phone||p.phone||'';
    const flag=getFlag(phone);
    const time=formatTime(b.start).replace(':','');
    const boat=n.boat||'--';
    const pax=n.pax||p.pax||'--';
    const balance=n.balance?n.balance+'EUR':'--';
    const skipper=n.skipper?n.skipper.toUpperCase():'--';
    const food=n.comment||'';
    text+=boat+' '+time+' --> '+pax+'pax.';
    if(food)text+=' '+food+'.';
    text+=' '+balance+' '+flag+' '+skipper+'\n';
  }
  document.getElementById('exportText').textContent=text;
  document.getElementById('exportModal').style.display='flex';
}
function closeExport(){document.getElementById('exportModal').style.display='none';}
function copyExport(){
  const text=document.getElementById('exportText').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=event.target;btn.textContent='Copiado!';
    setTimeout(()=>btn.textContent='Copiar',2000);
  });
}

// ── UI ────────────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  ['tomorrow','week','history'].forEach(v=>{document.getElementById('view-'+v).style.display=v===tab?'block':'none';});
  if(tab==='history')renderHistory();
}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('appContent').style.display='none';document.getElementById('tabBar').style.display='none';document.getElementById('btnSync').style.display='none';document.getElementById('btnRefresh').style.display='none';document.getElementById('btnLogout').style.display='none';}
function showApp(admin){document.getElementById('loginScreen').style.display='none';document.getElementById('appContent').style.display='block';document.getElementById('tabBar').style.display='flex';document.getElementById('btnRefresh').style.display='inline-flex';if(admin||isAdmin){document.getElementById('btnSync').style.display='inline-flex';document.getElementById('btnLogout').style.display='inline-flex';}}
function showLoading(msg){['tomorrow','week'].forEach(v=>{document.getElementById('view-'+v).innerHTML='<div class="state-screen"><div class="icon spinning">&#8635;</div><h2>'+(msg||'Cargando...')+'</h2></div>';});}
function showError(msg){['tomorrow','week'].forEach(v=>{document.getElementById('view-'+v).innerHTML='<div class="state-screen"><div class="icon">&#9888;</div><h2>Error</h2><p>'+esc(msg)+'</p></div>';});}

document.getElementById('todayBadge').textContent=new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
updateSyncInfo();

(async function init(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'),error=params.get('error');
  if(isAdmin){
    if(error){showLogin();alert('Error Google: '+error);return;}
    if(code){await handleCallback(code);return;}
    if(loadToken()){showApp(true);await syncCalendar();}
    else showLogin();
  }else{
    showApp(false);
    await loadFromSupabase();
  }
})();
</script>
