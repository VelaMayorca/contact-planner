<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vela Tours · Planning</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--deep:#08213a;--mid:#1a4a6b;--blue:#2d7db3;--teal:#4abfb0;--sand:#faf7f2;--white:#ffffff;--text:#0a2540;--muted:#5a7a94;--border:#d8e8f2;--success:#22a06b;--warn:#e68a00;--danger:#d93025;}
  body{font-family:'Inter',sans-serif;background:var(--sand);color:var(--text);min-height:100vh;}
  header{background:var(--deep);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
  .logo{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--white);display:flex;align-items:center;gap:10px;}
  .logo span{color:var(--teal);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .today-badge{font-size:0.75rem;font-weight:600;color:var(--teal);border:1.5px solid var(--teal);border-radius:20px;padding:3px 10px;}
  .btn{border:none;border-radius:8px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:opacity 0.2s;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{opacity:0.85;}.btn:disabled{opacity:0.5;pointer-events:none;}
  .btn-blue{background:var(--blue);color:#fff;}.btn-deep{background:var(--deep);color:#fff;}.btn-danger{background:var(--danger);color:#fff;}.btn-teal{background:var(--teal);color:#fff;}
  .tabs{background:var(--white);border-bottom:2px solid var(--border);display:flex;padding:0 28px;}
  .tab{padding:13px 20px;font-size:0.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color 0.15s,border-color 0.15s;white-space:nowrap;}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue);}.tab:hover:not(.active){color:var(--text);}
  main{padding:24px 28px;max-width:960px;margin:0 auto;}
  #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;gap:20px;}
  .login-icon{font-size:3rem;}.login-title{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text);}
  .login-sub{color:var(--muted);font-size:0.9rem;max-width:360px;line-height:1.6;}
  .btn-google{background:#fff;color:#3c4043;border:2px solid var(--border);border-radius:10px;padding:12px 24px;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:box-shadow 0.2s;}
  .btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,0.15);}
  .state-screen{text-align:center;padding:60px 20px;color:var(--muted);}
  .state-screen .icon{font-size:2.5rem;margin-bottom:14px;}
  .state-screen h2{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);margin-bottom:8px;}
  .state-screen p{font-size:0.88rem;line-height:1.6;}
  @keyframes spin{to{transform:rotate(360deg);}}.spinning{display:inline-block;animation:spin 1s linear infinite;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .summary-bar{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;gap:24px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(10,33,64,0.07);}
  .sum-item{text-align:center;}.sum-num{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--blue);line-height:1;}
  .sum-label{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:3px;}
  .admin-bar{background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-radius:12px;margin-bottom:20px;font-size:0.82rem;}
  .admin-bar strong{color:var(--teal);}
  .day-section{margin-bottom:32px;}
  .day-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .day-label{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--text);}
  .day-label .weekday{color:var(--muted);font-size:0.9rem;font-family:'Inter',sans-serif;font-weight:500;margin-left:6px;}
  .day-count{font-size:0.72rem;font-weight:700;background:var(--teal);color:#fff;border-radius:12px;padding:2px 8px;}
  .booking-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 12px rgba(10,33,64,0.07);transition:border-color 0.2s;}
  .booking-card:hover{border-color:var(--blue);}
  .card-top{padding:16px 20px;display:flex;align-items:flex-start;gap:14px;}
  .time-col{flex-shrink:0;text-align:center;min-width:52px;cursor:pointer;}
  .time-big{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--blue);line-height:1;}
  .time-end{font-size:0.7rem;color:var(--muted);margin-top:2px;}
  .divider-v{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;}
  .info-col{flex:1;min-width:0;cursor:pointer;}
  .booking-title{font-weight:700;font-size:1rem;color:var(--text);margin-bottom:4px;}
  .booking-buyer{font-size:0.88rem;color:var(--mid);font-weight:600;margin-bottom:3px;}
  .booking-email{font-size:0.78rem;color:var(--muted);margin-bottom:6px;}
  .booking-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;}
  .meta-chip{font-size:0.74rem;font-weight:600;padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;}
  .chip-pax{background:#e8f4fd;color:var(--blue);}.chip-type{background:#f0faf9;color:#1a8a7a;}
  .chip-boat{background:#fff3e0;color:#e65100;font-weight:700;}
  /* Phone editable */
  .phone-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .phone-input{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--mid);letter-spacing:0.03em;border:none;outline:none;background:transparent;width:200px;cursor:text;}
  .phone-input:focus{border-bottom:2px solid var(--blue);background:#f0f8ff;border-radius:4px 4px 0 0;padding:2px 4px;}
  .btn-phone-save{display:none;background:var(--success);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:0.72rem;font-weight:600;cursor:pointer;}
  .prefix-hint{font-size:0.74rem;color:var(--warn);display:block;margin-top:2px;}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .dot-pending{background:var(--warn);}.dot-done{background:var(--success);}.dot-none{background:var(--border);}
  .card-actions{padding:0 20px 14px;display:flex;gap:8px;flex-wrap:wrap;}
  .btn-sm{border:none;border-radius:7px;padding:6px 12px;font-size:0.78rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.15s,transform 0.1s;display:inline-flex;align-items:center;gap:5px;}
  .btn-sm:active{transform:scale(0.95);}
  .btn-copy{background:var(--border);color:var(--text);}.btn-copy.done{background:var(--success);color:#fff;}
  .btn-wa{background:#25d366;color:#fff;font-weight:700;}.btn-notes{background:var(--sand);border:1.5px solid var(--border);color:var(--muted);}
  .btn-export{background:var(--deep);color:#fff;}
  .notes-panel{border-top:1.5px solid var(--border);padding:16px 20px;background:#fafcff;display:none;}
  .notes-panel.open{display:block;}
  .notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  @media(max-width:600px){.notes-grid{grid-template-columns:1fr;}main{padding:16px;}}
  .note-field label{display:block;font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
  .note-field input,.note-field select,.note-field textarea{width:100%;font-family:'Inter',sans-serif;font-size:0.88rem;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;color:var(--text);background:#fff;outline:none;transition:border-color 0.2s;}
  .note-field input:focus,.note-field select:focus,.note-field textarea:focus{border-color:var(--blue);}
  .note-field textarea{resize:vertical;min-height:60px;}
  .notes-footer{display:flex;gap:8px;justify-content:flex-end;align-items:center;}
  .save-status{font-size:0.75rem;color:var(--muted);}
  .btn-save{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;}
  .btn-save.saved{background:var(--success);}
  /* Export modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:var(--white);border-radius:16px;padding:28px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
  .modal h2{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:16px;color:var(--text);}
  .export-text{background:#1a1a2e;color:#e0e0e0;font-family:monospace;font-size:0.88rem;padding:16px;border-radius:10px;white-space:pre-wrap;line-height:1.7;margin-bottom:16px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  @media print{header,.tabs,.btn-wa,.btn-copy,.btn-notes,.notes-footer,.btn,.admin-bar,.card-actions{display:none!important;}.notes-panel{display:block!important;}body{background:white;}.booking-card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;}}
</style>
</head>
<body>
<header>
  <div class="logo">&#9981; <span>Vela Tours</span></div>
  <div class="header-right">
    <div class="today-badge" id="todayBadge"></div>
    <button class="btn btn-teal" id="btnSync" onclick="syncCalendar()" style="display:none">&#8645; Sincronizar</button>
    <button class="btn btn-blue" id="btnRefresh" onclick="loadFromSupabase()" style="display:none">&#8635; Actualizar</button>
    <button class="btn btn-danger" id="btnLogout" onclick="logout()" style="display:none">Salir</button>
  </div>
</header>
<div class="tabs" id="tabBar" style="display:none">
  <div class="tab active" onclick="switchTab('tomorrow')" id="tab-tomorrow">&#128197; Manana</div>
  <div class="tab" onclick="switchTab('week')" id="tab-week">&#128197; Esta semana</div>
  <div class="tab" onclick="switchTab('planning')" id="tab-planning">&#128203; Planning</div>
</div>
<main>
  <div id="loginScreen" style="display:none">
    <div class="login-icon">&#9975;</div>
    <div class="login-title">Vela Tours &middot; Admin</div>
    <div class="login-sub">Conecta tu Google Calendar para sincronizar las reservas con el equipo.</div>
    <button class="btn-google" onclick="startAuth()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Conectar con Google
    </button>
  </div>
  <div id="appContent" style="display:none">
    <div id="view-tomorrow"></div>
    <div id="view-week" style="display:none"></div>
    <div id="view-planning" style="display:none"></div>
  </div>
</main>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal" style="display:none" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <h2>&#128203; Resumen del dia</h2>
    <div class="export-text" id="exportText"></div>
    <div class="modal-actions">
      <button class="btn btn-blue" onclick="copyExport()">&#128203; Copiar</button>
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const _a='472909472248-mkbdkopci5p8guo7eo3agl5a9v1mid';
const _b='ua.apps.googleusercontent.com';
const _c='GOCSPX-qsvIFRsFnn0nPD';
const _d='xOAywnCGYORS6O';
const _e='https://pqyiuhgybsnvhuz';
const _f='sjnpy.supabase.co';
const _g='sb_publishable_V3ZCmMWZwGCve5Os3AO6bA';
const _h='_A_-hQJMb';
const CLIENT_ID=_a+_b, CLIENT_SECRET=_c+_d, SUPABASE_URL=_e+_f, SUPABASE_KEY=_g+_h;
const CALENDAR_NAME='SARAH', ADMIN_KEY='vela-admin-2024';

const BOATS=['Servus','Gambitero','Trui','Jaleo','RunWild'];
const SKIPPERS=['Edu','Alberto','Silvio','Jaume','Gustavo','Leandro','Otro...'];

const urlParams=new URLSearchParams(window.location.search);
const isAdmin=urlParams.get('admin')===ADMIN_KEY||localStorage.getItem('vt_admin')===ADMIN_KEY;
if(urlParams.get('admin')===ADMIN_KEY){localStorage.setItem('vt_admin',ADMIN_KEY);window.history.replaceState({},'',window.location.pathname);}

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function loadAllNotes(){const{data,error}=await sb.from('notas').select('*');if(error){console.error(error);return{};}const map={};for(const r of(data||[]))map[r.event_id]=r;return map;}
async function upsertNote(eventId,fields){const{error}=await sb.from('notas').upsert({event_id:eventId,...fields,updated_at:new Date().toISOString()},{onConflict:'event_id'});if(error)throw error;}
async function saveEventsToSupabase(events){
  if(!events.length)return;
  const rows=events.map(b=>({id:b.id,title:b.title,start_time:b.start||null,end_time:b.end||null,date:b.date,buyer:b.parsed.buyer,phone:b.parsed.phone,email:b.parsed.email,pax:b.parsed.pax,variant:b.parsed.variant,updated_at:new Date().toISOString()}));
  const{error}=await sb.from('eventos').upsert(rows,{onConflict:'id'});
  if(error)throw error;
}
async function loadEventsFromSupabase(){
  const tom=new Date();tom.setDate(tom.getDate()+1);
  const tStr=toDateStr(tom);
  const wEnd=new Date(tom);wEnd.setDate(tom.getDate()+6);
  const wStr=toDateStr(wEnd);
  const{data,error}=await sb.from('eventos').select('*').gte('date',tStr).lte('date',wStr).order('start_time');
  if(error)throw error;
  return(data||[]).map(r=>({id:r.id,title:r.title,start:r.start_time,end:r.end_time,date:r.date,parsed:{buyer:r.buyer||'',phone:r.phone||'',email:r.email||'',pax:r.pax||'',variant:r.variant||''}}));
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let accessToken=null,tokenExpiry=0;
function getRedirectUri(){return window.location.href.split('?')[0].split('#')[0];}
function saveToken(t,exp){accessToken=t;tokenExpiry=Date.now()+(exp-60)*1000;try{sessionStorage.setItem('vt_token',t);sessionStorage.setItem('vt_expiry',tokenExpiry);}catch(e){}}
function loadToken(){try{const t=sessionStorage.getItem('vt_token'),e=parseInt(sessionStorage.getItem('vt_expiry')||'0');if(t&&Date.now()<e){accessToken=t;tokenExpiry=e;return true;}}catch(e){}return false;}
function clearToken(){accessToken=null;tokenExpiry=0;try{sessionStorage.removeItem('vt_token');sessionStorage.removeItem('vt_expiry');}catch(e){}}
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function genVerifier(){const a=new Uint8Array(32);crypto.getRandomValues(a);return b64url(a);}
async function genChallenge(v){return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));}
async function startAuth(){
  const ver=await genVerifier(),chal=await genChallenge(ver);
  sessionStorage.setItem('vt_verifier',ver);
  const p=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:getRedirectUri(),response_type:'code',scope:'https://www.googleapis.com/auth/calendar.readonly',code_challenge:chal,code_challenge_method:'S256',access_type:'online',prompt:'consent'});
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+p;
}
async function handleCallback(code){
  const ver=sessionStorage.getItem('vt_verifier')||'';sessionStorage.removeItem('vt_verifier');
  showLoading('Autenticando...');
  const r=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({code,client_id:CLIENT_ID,client_secret:CLIENT_SECRET,redirect_uri:getRedirectUri(),grant_type:'authorization_code',code_verifier:ver})});
  const d=await r.json();
  if(d.access_token){saveToken(d.access_token,d.expires_in||3600);window.history.replaceState({},'',window.location.pathname);showApp(true);await syncCalendar();}
  else showError('Error auth: '+(d.error_description||d.error||'desconocido'));
}
function logout(){clearToken();localStorage.removeItem('vt_admin');showLogin();}

// ── Calendar ──────────────────────────────────────────────────────────────────
async function getCalendarId(){
  const r=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  const cal=(d.items||[]).find(c=>c.summary?.toUpperCase().includes(CALENDAR_NAME)||c.summaryOverride?.toUpperCase().includes(CALENDAR_NAME));
  return cal?cal.id:'primary';
}
async function fetchGoogleEvents(calId,tMin,tMax){
  const p=new URLSearchParams({timeMin:tMin.toISOString(),timeMax:tMax.toISOString(),singleEvents:'true',orderBy:'startTime',maxResults:'100'});
  const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events?'+p,{headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();if(d.error)throw new Error(d.error.message);return d.items||[];
}
async function syncCalendar(){
  const btn=document.getElementById('btnSync');btn.disabled=true;btn.innerHTML='&#8645; Sincronizando...';
  showLoading('Sincronizando con Google Calendar...');
  try{
    const calId=await getCalendarId();
    const tom=new Date();tom.setDate(tom.getDate()+1);
    const tStart=new Date(tom);tStart.setHours(0,0,0,0);
    const wEnd=new Date(tStart);wEnd.setDate(tStart.getDate()+6);wEnd.setHours(23,59,59,999);
    const events=await fetchGoogleEvents(calId,tStart,wEnd);
    const bookings=events.map(parseEvent);
    await saveEventsToSupabase(bookings);
    await loadFromSupabase();
  }catch(err){showError('Error sync: '+err.message);}
  btn.disabled=false;btn.innerHTML='&#8645; Sincronizar';
}
async function loadFromSupabase(){
  const btn=document.getElementById('btnRefresh');if(btn){btn.disabled=true;btn.innerHTML='&#8635; Cargando...';}
  showLoading('Cargando reservas...');
  try{
    const[events,notesMap]=await Promise.all([loadEventsFromSupabase(),loadAllNotes()]);
    allNotes=notesMap;allBookings=events;
    const tom=new Date();tom.setDate(tom.getDate()+1);
    const tStr=toDateStr(tom);
    renderView(allBookings.filter(b=>b.date===tStr),'view-tomorrow',true);
    renderView(allBookings,'view-week',false);
    renderView(allBookings,'view-planning',false);
    if(!events.length){['tomorrow','week','planning'].forEach(v=>{document.getElementById('view-'+v).innerHTML='<div class="state-screen"><div class="icon">&#127754;</div><h2>Sin reservas</h2><p>'+(isAdmin?'Pulsa <strong>Sincronizar</strong> para cargar el calendario.':'El administrador aun no ha sincronizado.')+'</p></div>';});}
  }catch(err){showError('Error: '+err.message);}
  if(btn){btn.disabled=false;btn.innerHTML='&#8635; Actualizar';}
}

// ── Parser ────────────────────────────────────────────────────────────────────
function parseEvent(ev){
  const raw=ev.description||'';
  const desc=raw.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
  const get=re=>{const m=desc.match(re);return m?(m[1]||'').trim():'';};
  const buyer=get(/Buyer:\s*(.+?)(?=Customer Phone:|Customer Email:|$)/i);
  const phone=(get(/Customer Phone:\s*(\S+)/i)||get(/Phone:\s*(\S+)/i)).replace(/[<>]/g,'');
  const email=(get(/Customer Email:\s*(\S+)/i)||get(/Email:\s*(\S+)/i)).replace(/[<>[\]]/g,'');
  const pax=get(/N[uú]mero de participantes:\s*(\d+)/i)||get(/participants?:\s*(\d+)/i)||get(/(\d+)\s*pax/i);
  const variant=get(/Variation Name:\s*(.+?)(?=Buyer:|Customer|$)/i);
  const start=ev.start?.dateTime||ev.start?.date||'';
  return{id:ev.id,title:ev.summary||'Sin titulo',start,end:ev.end?.dateTime||ev.end?.date||'',date:start.split('T')[0],parsed:{buyer,phone,email,pax,variant}};
}

// ── Prefix ────────────────────────────────────────────────────────────────────
const CDB=[{cc:'+34',flag:'\uD83C\uDDEA\uD83C\uDDF8',local:[9]},{cc:'+44',flag:'\uD83C\uDDEC\uD83C\uDDE7',local:[10]},{cc:'+49',flag:'\uD83C\uDDE9\uD83C\uDDEA',local:[10,11]},
  {cc:'+33',flag:'\uD83C\uDDEB\uD83C\uDDF7',local:[9]},{cc:'+1',flag:'\uD83C\uDDFA\uD83C\uDDF8',local:[10]},{cc:'+31',flag:'\uD83C\uDDF3\uD83C\uDDF1',local:[9]},
  {cc:'+39',flag:'\uD83C\uDDEE\uD83C\uDDF9',local:[9,10]},{cc:'+351',flag:'\uD83C\uDDF5\uD83C\uDDF9',local:[9]},{cc:'+55',flag:'\uD83C\uDDE7\uD83C\uDDF7',local:[11]},{cc:'+61',flag:'\uD83C\uDDE6\uD83C\uDDFA',local:[9]}];
const BOOST={'+34':2.5,'+44':2.0,'+49':1.8,'+33':1.5,'+1':1.5,'+31':1.4};
function hasPrefix(p){const n=p.replace(/[\s\-(). ]/g,'');return n.startsWith('+')||n.startsWith('00');}
function guessPrefix(phone){
  const n=phone.replace(/[\s\-(). ]/g,'');if(hasPrefix(phone))return null;
  let best=null,bestS=0;
  for(const e of CDB){let s=5;
    if(e.local.includes(n.length))s+=30;
    if(e.cc==='+34'&&n.length===9&&['6','7'].includes(n[0]))s+=50;
    if(e.cc==='+44'&&n.startsWith('07')&&n.length===11)s+=50;
    if(e.cc==='+31'&&n.startsWith('06')&&n.length===10)s+=45;
    if(e.cc==='+49'&&n.startsWith('0')&&n.length>=10)s+=25;
    if(e.cc==='+33'&&n.startsWith('0')&&n.length===10)s+=30;
    if(e.cc==='+1'&&n.length===10)s+=20;
    s*=(BOOST[e.cc]||1);if(s>bestS){bestS=s;best=e;}}
  return best;
}
function getFlag(phone){
  if(!phone)return '';
  const n=phone.replace(/[\s\-(). ]/g,'');
  if(n.startsWith('+')){
    for(const len of[3,2,1]){const cc='+'+n.slice(1,1+len);const e=CDB.find(x=>x.cc===cc);if(e)return e.flag;}
  }
  const g=guessPrefix(phone);return g?g.flag:'';
}
function buildWa(phone){
  let n=phone.replace(/[\s\-(). ]/g,'');
  if(n.startsWith('00'))n='+'+n.slice(2);
  if(!n.startsWith('+')){const g=guessPrefix(phone);if(g){let l=n;if(['+44','+31','+49','+33'].includes(g.cc)&&n.startsWith('0'))l=n.slice(1);n=g.cc.replace('+','')+l;}}
  else n=n.slice(1);return n;
}

// ── State ─────────────────────────────────────────────────────────────────────
let allBookings=[],allNotes={};
function toDateStr(d){return d.toISOString().split('T')[0];}
function formatTime(iso){if(!iso||!iso.includes('T'))return'--';try{return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}catch(e){return'--';}}
function formatDateLabel(ds){try{const d=new Date(ds+'T12:00:00');return{weekday:d.toLocaleDateString('es-ES',{weekday:'long'}),rest:d.toLocaleDateString('es-ES',{day:'numeric',month:'long'})};}catch(e){return{weekday:'',rest:ds};}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Render ────────────────────────────────────────────────────────────────────
function renderView(bookings,cid,isTomorrow){
  const el=document.getElementById(cid);
  if(!bookings.length){el.innerHTML='<div class="state-screen"><div class="icon">&#127754;</div><h2>Sin reservas</h2><p>No hay tours para este periodo.</p></div>';return;}
  const byDate={};for(const b of bookings){if(!byDate[b.date])byDate[b.date]=[];byDate[b.date].push(b);}
  const totalPax=bookings.reduce((s,b)=>s+(parseInt(b.parsed.pax)||0),0);
  const contacted=bookings.filter(b=>allNotes[b.id]?.contacted==='si').length;
  let adminBar='';
  if(isAdmin&&isTomorrow){adminBar='<div class="admin-bar"><span>&#128274; Modo <strong>Admin</strong></span><button class="btn btn-teal" onclick="syncCalendar()" style="padding:6px 12px;font-size:0.78rem">&#8645; Sincronizar ahora</button></div>';}
  let exportBtn=isTomorrow?'<button class="btn btn-export" onclick="showExport()">&#128203; Exportar resumen</button>':'';
  let html=adminBar+'<div class="top-bar"><div class="summary-bar"><div class="sum-item"><div class="sum-num">'+bookings.length+'</div><div class="sum-label">Reservas</div></div><div class="sum-item"><div class="sum-num">'+(totalPax||'--')+'</div><div class="sum-label">Personas</div></div><div class="sum-item"><div class="sum-num">'+contacted+'/'+bookings.length+'</div><div class="sum-label">Contactados</div></div></div><div style="display:flex;gap:8px">'+exportBtn+'<button class="btn btn-deep" onclick="window.print()">Imprimir</button></div></div>';
  for(const[date,dayB]of Object.entries(byDate)){
    const{weekday,rest}=formatDateLabel(date);
    const dayPax=dayB.reduce((s,b)=>s+(parseInt(b.parsed.pax)||0),0);
    html+='<div class="day-section"><div class="day-header"><div class="day-label">'+rest+'<span class="weekday">'+weekday+'</span></div><div class="day-count">'+dayB.length+' tour'+(dayB.length>1?'s':'')+' - '+dayPax+' pax</div></div>';
    for(const b of dayB)html+=renderCard(b);
    html+='</div>';
  }
  el.innerHTML=html;
}

function renderCard(b){
  const p=b.parsed,n=allNotes[b.id]||{};
  const phone=n.phone||p.phone||'';
  const needsP=phone&&!hasPrefix(phone);
  const guess=needsP?guessPrefix(phone):null;
  const waNum=phone?buildWa(phone):'';
  const flag=getFlag(phone);
  const dotC=n.contacted==='si'?'dot-done':(phone?'dot-pending':'dot-none');
  const sid=esc(b.id);
  const boat=n.boat||'';
  const skipper=n.skipper||'';

  let html='<div class="booking-card" id="card-'+sid+'"><div class="card-top">';
  html+='<div class="time-col" onclick="toggleNotes(\''+sid+'\')"><div class="time-big">'+formatTime(b.start)+'</div><div class="time-end">'+formatTime(b.end)+'</div></div>';
  html+='<div class="divider-v"></div>';
  html+='<div class="info-col" onclick="toggleNotes(\''+sid+'\')">';
  html+='<div class="booking-title">'+esc(b.title)+'</div>';
  if(p.buyer)html+='<div class="booking-buyer">&#129489; '+esc(p.buyer)+'</div>';
  if(p.email)html+='<div class="booking-email">&#9993; '+esc(p.email)+'</div>';
  html+='<div class="booking-meta">';
  if(p.pax)html+='<span class="meta-chip chip-pax">&#128101; '+esc(p.pax)+' pax</span>';
  if(boat)html+='<span class="meta-chip chip-boat">&#9981; '+esc(boat)+'</span>';
  if(skipper)html+='<span class="meta-chip chip-type">🧑‍✈️ '+esc(skipper)+'</span>';
  if(p.variant)html+='<span class="meta-chip chip-type">'+esc(p.variant)+'</span>';
  html+='</div>';
  html+='</div>';
  html+='<div class="status-dot '+dotC+'" id="dot-'+sid+'"></div>';
  html+='</div>'; // card-top

  // Phone row (outside card-top, not clickable for notes)
  html+='<div style="padding:0 20px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  if(flag)html+='<span style="font-size:1.1rem">'+flag+'</span>';
  html+='<input class="phone-input" id="phone-'+sid+'" value="'+esc(phone)+'" placeholder="Sin telefono" oninput="onPhoneInput(\''+sid+'\')" onblur="onPhoneBlur(\''+sid+'\')" onclick="event.stopPropagation()"/>';
  html+='<button class="btn-phone-save" id="phonesave-'+sid+'" onclick="savePhone(\''+sid+'\',\''+esc(b.id)+'\')">Guardar</button>';
  if(needsP&&guess)html+='<span class="prefix-hint">&#9888; sin prefijo - sugerido '+esc(guess.flag)+' '+esc(guess.cc)+'</span>';
  html+='</div>';

  // Actions
  html+='<div class="card-actions">';
  if(phone){
    html+='<button class="btn-sm btn-copy" onclick="copyText(\''+esc(phone)+'\',this)">&#128203; Copiar</button>';
    html+='<a href="https://wa.me/'+waNum+'" target="_blank"><button class="btn-sm btn-wa">&#128172; WhatsApp</button></a>';
  }
  html+='<button class="btn-sm btn-notes" onclick="toggleNotes(\''+sid+'\')">&#128221; '+(allNotes[b.id]?'Ver notas':'Notas')+'</button>';
  html+='</div>';

  // Notes panel
  const boatOptions=BOATS.map(bt=>'<option value="'+bt+'" '+(n.boat===bt?'selected':'')+'>'+bt+'</option>').join('');
  const skipperOptions=SKIPPERS.map(sk=>'<option value="'+sk+'" '+(n.skipper===sk?'selected':'')+'>'+sk+'</option>').join('');

  html+='<div class="notes-panel '+(allNotes[b.id]?'open':'')+'" id="notes-'+sid+'">';
  html+='<div class="notes-grid">';
  html+='<div class="note-field"><label>Personas confirmadas</label><input type="number" min="1" max="50" placeholder="'+esc(p.pax||'')+'" value="'+esc(n.pax||'')+'" id="n-pax-'+sid+'"/></div>';
  html+='<div class="note-field"><label>Comida</label><select id="n-food-'+sid+'"><option value="" '+((!n.food)?'selected':'')+'>-- Sin confirmar --</option><option value="si" '+((n.food==='si')?'selected':'')+'>Si quieren</option><option value="no" '+((n.food==='no')?'selected':'')+'>No quieren</option><option value="pendiente" '+((n.food==='pendiente')?'selected':'')+'>Pendiente</option></select></div>';
  html+='<div class="note-field"><label>Barco</label><select id="n-boat-'+sid+'"><option value="">-- Seleccionar --</option>'+boatOptions+'</select></div>';
  html+='<div class="note-field"><label>Patron</label><select id="n-skipper-'+sid+'"><option value="">-- Seleccionar --</option>'+skipperOptions+'</select></div>';
  html+='<div class="note-field"><label>Balance (EUR)</label><input type="number" min="0" step="0.01" placeholder="0.00" value="'+esc(n.balance||'')+'" id="n-balance-'+sid+'"/></div>';
  html+='<div class="note-field"><label>Extras</label><input type="text" placeholder="Snorkel, kayak, bebidas..." value="'+esc(n.extras||'')+'" id="n-extras-'+sid+'"/></div>';
  html+='<div class="note-field"><label>Contactado</label><select id="n-contacted-'+sid+'"><option value="" '+((!n.contacted)?'selected':'')+'>-- Pendiente --</option><option value="si" '+((n.contacted==='si')?'selected':'')+'>Si, contactado</option><option value="no_responde" '+((n.contacted==='no_responde')?'selected':'')+'>No responde</option></select></div>';
  html+='<div class="note-field" style="grid-column:1/-1"><label>Peticiones especiales / Comida</label><textarea placeholder="Tapas, Paella, alergias..." id="n-comment-'+sid+'">'+esc(n.comment||'')+'</textarea></div>';
  html+='</div>';
  html+='<div class="notes-footer"><span class="save-status" id="status-'+sid+'"></span><button class="btn-save" id="save-'+sid+'" onclick="saveNotes(\''+sid+'\',\''+esc(b.id)+'\')">Guardar notas</button></div>';
  html+='</div></div>';
  return html;
}

// ── Phone editing ─────────────────────────────────────────────────────────────
function onPhoneInput(sid){
  const btn=document.getElementById('phonesave-'+sid);
  if(btn)btn.style.display='inline-flex';
}
function onPhoneBlur(sid){
  // Hide save btn after short delay (to allow click)
  setTimeout(()=>{
    const inp=document.getElementById('phone-'+sid);
    const btn=document.getElementById('phonesave-'+sid);
    // Only hide if not focused
    if(document.activeElement!==btn&&btn)btn.style.display='none';
  },200);
}
async function savePhone(sid,eventId){
  const inp=document.getElementById('phone-'+sid);
  const btn=document.getElementById('phonesave-'+sid);
  if(!inp)return;
  const newPhone=inp.value.trim();
  btn.textContent='...';
  try{
    await upsertNote(eventId,{...(allNotes[eventId]||{}),phone:newPhone});
    if(!allNotes[eventId])allNotes[eventId]={};
    allNotes[eventId].phone=newPhone;
    btn.textContent='OK';btn.style.background='var(--success)';
    setTimeout(()=>{btn.style.display='none';btn.textContent='Guardar';btn.style.background='';},1500);
  }catch(err){btn.textContent='Error';setTimeout(()=>{btn.style.display='none';btn.textContent='Guardar';},2000);}
}

function toggleNotes(id){document.getElementById('notes-'+id)?.classList.toggle('open');}

async function saveNotes(sid,eventId){
  const btn=document.getElementById('save-'+sid),st=document.getElementById('status-'+sid);
  btn.disabled=true;btn.textContent='Guardando...';if(st)st.textContent='';
  const fields={
    pax:document.getElementById('n-pax-'+sid)?.value||'',
    food:document.getElementById('n-food-'+sid)?.value||'',
    boat:document.getElementById('n-boat-'+sid)?.value||'',
    skipper:document.getElementById('n-skipper-'+sid)?.value||'',
    balance:parseFloat(document.getElementById('n-balance-'+sid)?.value)||null,
    extras:document.getElementById('n-extras-'+sid)?.value||'',
    contacted:document.getElementById('n-contacted-'+sid)?.value||'',
    comment:document.getElementById('n-comment-'+sid)?.value||'',
    phone:allNotes[eventId]?.phone||''
  };
  try{
    await upsertNote(eventId,fields);allNotes[eventId]={...fields,event_id:eventId};
    btn.textContent='Guardado';btn.classList.add('saved');if(st)st.textContent='Sincronizado';
    setTimeout(()=>{btn.textContent='Guardar notas';btn.classList.remove('saved');btn.disabled=false;if(st)st.textContent='';},2500);
    const dot=document.getElementById('dot-'+sid);if(dot)dot.className='status-dot '+(fields.contacted==='si'?'dot-done':'dot-pending');
    // Update boat/skipper chips in card header
    const meta=document.querySelector('#card-'+sid+' .booking-meta');
    if(meta){
      const pax=allBookings.find(b=>b.id===eventId)?.parsed?.pax||'';
      const variant=allBookings.find(b=>b.id===eventId)?.parsed?.variant||'';
      let chips='';
      if(pax)chips+='<span class="meta-chip chip-pax">&#128101; '+esc(pax)+' pax</span>';
      if(fields.boat)chips+='<span class="meta-chip chip-boat">🚢 '+esc(fields.boat)+'</span>';
      if(fields.skipper)chips+='<span class="meta-chip chip-type">🧑‍✈️ '+esc(fields.skipper)+'</span>';
      if(variant)chips+='<span class="meta-chip chip-type">'+esc(variant)+'</span>';
      meta.innerHTML=chips;
    }
  }catch(err){btn.textContent='Error';btn.disabled=false;if(st)st.textContent='Error: '+err.message;}
}

function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copiado';btn.classList.add('done');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('done');},2000);});}

// ── Export ────────────────────────────────────────────────────────────────────
function showExport(){
  const tom=new Date();tom.setDate(tom.getDate()+1);
  const tStr=toDateStr(tom);
  const dayBookings=allBookings.filter(b=>b.date===tStr);
  if(!dayBookings.length){alert('No hay reservas para manana.');return;}

  const weekdays=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const d=new Date(tStr+'T12:00:00');
  let text='*'+weekdays[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+'*\n\n';

  for(const b of dayBookings){
    const n=allNotes[b.id]||{};
    const p=b.parsed;
    const phone=n.phone||p.phone||'';
    const flag=getFlag(phone);
    const time=formatTime(b.start).replace(':','');
    const boat=n.boat||'--';
    const pax=n.pax||p.pax||'--';
    const balance=n.balance?n.balance+'EUR':'--';
    const skipper=n.skipper?(n.skipper.toUpperCase()):'--';
    const food=n.comment||'';
    const buyer=p.buyer?(p.buyer.toUpperCase()):'--';

    text+=boat+' '+time+' --> '+pax+'pax.';
    if(food)text+=' '+food+'.';
    text+=' '+balance;
    text+=' '+flag+' '+skipper;
    text+='\n';
  }

  document.getElementById('exportText').textContent=text;
  document.getElementById('exportModal').style.display='flex';
}
function closeExport(){document.getElementById('exportModal').style.display='none';}
function copyExport(){
  const text=document.getElementById('exportText').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=event.target;btn.textContent='Copiado!';
    setTimeout(()=>btn.textContent='Copiar',2000);
  });
}

function switchTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');['tomorrow','week','planning'].forEach(v=>{document.getElementById('view-'+v).style.display=v===tab?'block':'none';});}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('appContent').style.display='none';document.getElementById('tabBar').style.display='none';document.getElementById('btnSync').style.display='none';document.getElementById('btnRefresh').style.display='none';document.getElementById('btnLogout').style.display='none';}
function showApp(admin){document.getElementById('loginScreen').style.display='none';document.getElementById('appContent').style.display='block';document.getElementById('tabBar').style.display='flex';document.getElementById('btnRefresh').style.display='inline-flex';if(admin||isAdmin){document.getElementById('btnSync').style.display='inline-flex';document.getElementById('btnLogout').style.display='inline-flex';}}
function showLoading(msg){['tomorrow','week','planning'].forEach(v=>{document.getElementById('view-'+v).innerHTML='<div class="state-screen"><div class="icon spinning">&#8635;</div><h2>'+(msg||'Cargando...')+'</h2></div>';});}
function showError(msg){['tomorrow','week','planning'].forEach(v=>{document.getElementById('view-'+v).innerHTML='<div class="state-screen"><div class="icon">&#9888;</div><h2>Error</h2><p>'+esc(msg)+'</p></div>';});}

document.getElementById('todayBadge').textContent=new Date().toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();

(async function init(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'),error=params.get('error');
  if(isAdmin){
    if(error){showLogin();alert('Error Google: '+error);return;}
    if(code){await handleCallback(code);return;}
    if(loadToken()){showApp(true);await syncCalendar();}
    else showLogin();
  }else{
    showApp(false);
    await loadFromSupabase();
  }
})();
</script>
